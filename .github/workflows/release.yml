name: Release

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'GitHydra ${{ github.ref_name }}'
          releaseBody: 'See the assets to download this version.'
          releaseDraft: false
          prerelease: false

      - name: Create DMG installer
        run: |
          APP_PATH="src-tauri/target/release/bundle/macos/GitHydra.app"
          DMG_DIR="src-tauri/target/release/bundle/dmg"
          DMG_PATH="$DMG_DIR/GitHydra_${{ github.ref_name }}_aarch64.dmg"
          mkdir -p "$DMG_DIR"
          hdiutil create -srcfolder "$APP_PATH" -volname "GitHydra" -fs HFS+ -format UDZO -size 50m "$DMG_PATH"
          gh release upload ${{ github.ref_name }} "$DMG_PATH" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
