<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>GitHydra</title>
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:"
    />
  </head>
  <body>
    <div id="root">
      <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;background-color:#f9fafb;">
        <div style="width:40px;height:40px;border:4px solid #e5e7eb;border-top-color:#3b82f6;border-radius:50%;animation:spin 1s linear infinite;"></div>
        <p style="margin-top:16px;font-size:14px;color:#6b7280;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;">Loading GitHydra...</p>
      </div>
      <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
    </div>
    <script type="module" src="/src/renderer/main.tsx"></script>
  </body>
</html>
